<!doctype html>
<!--
  Liu — DMG installer window background (design source).

  Logical canvas is 640x400 points (the Finder window content size set by
  scripts/dmg_build_settings.py). Rendered to background.png (1x) and
  background@2x.png (2x) by scripts/dmg_render_background.sh via native WebKit;
  tiffutil folds both into a HiDPI background.tiff at package time.

  Clean background — no embedded text. The DMG volume name ("Liu") serves
  as the window title, and Finder draws its own icon labels. Only the
  install arrow is rendered here.
-->
<html>
<head>
<meta charset="utf-8">
<style>
  /* No fonts needed — all text is rendered by Finder itself. */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 640px; height: 400px; overflow: hidden;
    background: #121212;                              /* --page-bg */
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .canvas { position: relative; width: 640px; height: 400px; }

  .arrow { position: absolute; left: 0; top: 0; width: 640px; height: 400px; }
</style>
</head>
<body>
  <div class="canvas">

    <svg class="arrow" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="250" y1="198" x2="399" y2="198">
          <stop offset="0" stop-color="#A85BD8"/>
          <stop offset="1" stop-color="#D894F8"/>
        </linearGradient>
      </defs>
      <g stroke="url(#ag)" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
        <!-- Main arrow shaft (first sketchy stroke) -->
        <path d="M 250,200 C 285,196 325,202 384,198" />
        <!-- Main arrow shaft (second sketchy stroke overlapping) -->
        <path d="M 252,198 C 290,201 330,195 382,199" stroke-width="2" opacity="0.8" />
        <!-- Arrowhead upper prong -->
        <path d="M 368,188 C 374,191 382,194 397,198" />
        <!-- Arrowhead lower prong -->
        <path d="M 369,210 C 375,206 383,202 397,198" />
        <!-- Sketchy overlaps on arrowhead -->
        <path d="M 366,190 C 372,193 378,195 395,198" stroke-width="2" opacity="0.8" />
        <path d="M 367,208 C 373,205 379,201 395,198" stroke-width="2" opacity="0.8" />
      </g>
    </svg>
  </div>
</body>
</html>
